<!--
  Marca do PITWALL: o muro dos boxes sob o pórtico de largada.

  Cinco luzes sobre uma barra — o mesmo glifo que fecha a cena LIGHTS OUT, e a
  mesma contagem do arnês de cinco pontos. Lê a 16px porque é só isso: uma
  fileira de pontos e um traço. A cor é o accent Ember (default do app); o ícone
  é asset estático de sistema operacional e não acompanha o tema em runtime.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="114" ry="114" fill="#ff7a45"/>
  <g fill="#ffffff">
    <circle cx="112" cy="196" r="27"/>
    <circle cx="184" cy="196" r="27"/>
    <circle cx="256" cy="196" r="27"/>
    <circle cx="328" cy="196" r="27"/>
    <circle cx="400" cy="196" r="27"/>
    <rect x="94" y="290" width="324" height="62" rx="16" ry="16"/>
  </g>
</svg>
