appId: com.thiagomatumoto.claude-manager
productName: Pitwall
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!shared/*'
  - '!{electron.vite.config.ts,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintrc,.prettierrc,.npmrc}'
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/node-pty/**
# O sidecar python NÃO pode ficar dentro do asar (python3 não lê de dentro do
# arquivo). extraResources copia `sidecar/` para `<resources>/sidecar`, de onde
# resolveSidecarScript o resolve via process.resourcesPath em packaged.
extraResources:
  - from: sidecar
    to: sidecar
    filter:
      - '**/*'
npmRebuild: false
publish:
  provider: github
  owner: ThiagoEMatumoto
  repo: claude-manager
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: thiagoeijimatumoto@gmail.com
  icon: build/icons
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  identity: null
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
