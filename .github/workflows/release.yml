name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes "Automated draft for $TAG. Review the Linux, macOS and Windows artifacts before publishing." \
            || true

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, args: '--linux AppImage deb' }
          - { os: macos-latest, args: '--mac dmg zip' }
          - { os: windows-latest, args: '--win nsis' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Rebuild native modules against Electron ABI
        run: npm run rebuild:native

      - run: npm run build

      - name: Build and publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
