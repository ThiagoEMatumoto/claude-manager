# Scratch de e2e/testes que vive em /tmp (tmpfs = RAM).
# Órfãos de runs abortados (SIGKILL, OOM) expiram em 6h.
#   cm-drive-userdata-*  claude-manager e2e/driver/launch.ts
#   mongo-mem-*          mongodb-memory-server (legal-core)
# A política geral do /tmp (10d) é permissiva demais pra tmpfs.
#
# Instalar com:
#   sudo install -m 0644 -o root -g root dev-scratch-cleanup.conf \
#     /etc/tmpfiles.d/dev-scratch-cleanup.conf
e /tmp/cm-drive-userdata-* - - - 6h
e /tmp/mongo-mem-*         - - - 6h
